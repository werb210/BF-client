name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          cd client-app
          npm ci

      - name: Build app
        run: |
          cd client-app
          npm run build

      - name: Deploy (NO ORYX BUILD)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # CRITICAL: point directly to built output
          app_location: "client-app/dist"

          # CRITICAL: disable Azure build completely
          skip_app_build: true
