name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client-app

    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify SWA config in artifact (Block 16)
        working-directory: ./client-app
        run: |
          if [ ! -f dist/staticwebapp.config.json ]; then
            echo "::error::dist/staticwebapp.config.json missing — SPA fallback will break (hard reloads will 404)."
            exit 1
          fi
          echo "✓ staticwebapp.config.json present in dist/"

      - name: Check build size
        run: |
          echo "File count:"
          find dist | wc -l
          echo "Total size:"
          du -sh dist

      - name: Deploy (NO ORYX)
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}

          app_location: "client-app/dist"
          skip_app_build: true
