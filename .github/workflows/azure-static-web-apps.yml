name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Verify build output (HARD FAIL IF WRONG)
        run: |
          echo "Checking dist contents..."
          ls -la client-app/dist
          if [ ! -f client-app/dist/index.html ]; then
            echo "ERROR: client-app/dist/index.html missing"
            exit 1
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # CRITICAL FIX
          app_location: "client-app/dist"
          output_location: ""

          # PREVENT AZURE BUILD (WE ALREADY BUILT)
          skip_app_build: true

          production_branch: "main"
