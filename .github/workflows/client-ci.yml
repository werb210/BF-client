name: client-ci

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run typecheck

      - run: CI=1 npm --prefix client-app run test

      - run: npm --prefix client-app run build
